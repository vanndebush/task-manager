<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="app-container">
    <header>
      <h1>Task Manager</h1>
      <p>Manage your daily goals</p>
    </header>
    <form id="task-form" autocomplete="off">
      <input type="text" id="task-input" placeholder="What needs to be done?" required autofocus>
      <button type="submit" id="add-btn">Add Task</button>
    </form>
    <ul id="task-list"></ul>
  </main>

  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Delete Task?</h3>
      <p>Are you sure you want to delete this task? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="cancel-delete" class="btn-cancel">Cancel</button>
        <button id="confirm-delete" class="btn-confirm-delete">Delete</button>
      </div>
    </div>
  </div>
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Edit Task</h3>
      <form id="edit-form" autocomplete="off">
        <input type="text" id="edit-input" required>
        <div class="modal-actions">
          <button type="button" id="cancel-edit" class="btn-cancel">Cancel</button>
          <button type="submit" id="confirm-edit" class="btn-confirm-edit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
